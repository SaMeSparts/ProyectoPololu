<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control de Almacén</title>
    </head>
  <body class="flex items-center justify-center min-h-screen font-sans text-gray-800 bg-gray-50">
    
    <div class="w-full max-w-md p-8 bg-white border border-gray-100 shadow-sm rounded-xl">
      
      <div class="flex items-center justify-between mb-8">
        <h1 class="text-2xl font-semibold tracking-tight">Centro de Mando</h1>
        <div class="flex items-center gap-2">
          <span id="status-dot" class="w-3 h-3 bg-red-500 rounded-full"></span>
          <span id="status-text" class="text-sm font-medium text-gray-500">Desconectado</span>
        </div>
      </div>

      <p class="mb-6 text-sm text-gray-500">Selecciona el destino del transporte autónomo:</p>

      <div class="grid grid-cols-2 gap-4 mb-6">
        <button id="btn-A" class="py-4 font-medium transition-colors border border-gray-200 rounded-lg outline-none bg-gray-50 hover:bg-gray-100 focus:ring-2 focus:ring-blue-500">
          Zona A
        </button>
        <button id="btn-B" class="py-4 font-medium transition-colors border border-gray-200 rounded-lg outline-none bg-gray-50 hover:bg-gray-100 focus:ring-2 focus:ring-blue-500">
          Zona B
        </button>
        <button id="btn-C" class="py-4 font-medium transition-colors border border-gray-200 rounded-lg outline-none bg-gray-50 hover:bg-gray-100 focus:ring-2 focus:ring-blue-500">
          Zona C
        </button>
        <button id="btn-R" class="py-4 font-medium text-white transition-colors bg-gray-800 rounded-lg shadow-sm outline-none hover:bg-gray-700 focus:ring-2 focus:ring-gray-400">
          Retorno (Inicio)
        </button>
      </div>

      <div class="pt-6 mt-8 border-t border-gray-100">
        <p class="mb-2 text-xs tracking-wider text-gray-400 uppercase">Última orden enviada</p>
        <div id="console-output" class="p-3 font-mono text-sm text-gray-600 border border-gray-100 rounded bg-gray-50">
          Esperando comandos...
        </div>
      </div>

    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
